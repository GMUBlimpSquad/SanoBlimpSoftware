name: Deploy mdBook

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Install mdBook
        run: cargo install mdbook

      - name: Build book
        working-directory: docs
        run: mdbook build
